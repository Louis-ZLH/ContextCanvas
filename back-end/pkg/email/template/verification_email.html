<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9;">
    <div style="max-width: 480px; margin: 0 auto; padding: 32px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #333;">
        <h2 style="margin: 0 0 16px 0; font-size: 20px; color: #111;">ContextCanvas Verification Code</h2>
        <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.5;">Your verification code is:</p>
        <div style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #333; background: #f0f0f0; padding: 16px; text-align: center; border-radius: 8px;">{{.Code}}</div>
        <p style="margin: 16px 0 0 0; font-size: 14px; line-height: 1.5; color: #666;">The verification code is valid for {{.ExpiryMinutes}} minutes. Please do not share the code with others.</p>
    </div>
</body>
</html>
